<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Login - Terra's Finest</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f7ebe2; min-height:100vh; display:flex; flex-direction:column; }
        header { height:90px; background:linear-gradient(to bottom,#5a5a5a,#383838); display:flex; align-items:center; padding:0 32px; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
        .logo { font-family:'Great Vibes',cursive; font-size:36px; color:#e87734; text-shadow:1px 1px 3px rgba(0,0,0,0.5); }
        .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:60px 20px; }
        .box { background:#fffaf0; border:1px solid #ddd; border-top:4px solid #e87734; width:360px; padding:34px 30px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        .box-title { font-family:'Great Vibes',cursive; font-size:30px; color:#e87734; text-align:center; margin-bottom:6px; }
        .box-sub { text-align:center; font-size:12px; color:#6b6b6b; margin-bottom:26px; }
        label { display:block; font-size:11px; font-weight:bold; color:#6b6b6b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
        input[type="password"] { width:100%; padding:9px 11px; border:1px solid #ddd; background:#fff; font-size:14px; font-family:Arial,sans-serif; color:#272727; outline:none; margin-bottom:16px; transition:border-color 0.2s; }
        input[type="password"]:focus { border-color:#e87734; }
        .err { background:#fff0f0; border:1px solid #ffaaaa; color:#cc3300; padding:7px 10px; font-size:12px; margin-bottom:12px; display:none; }
        .err.show { display:block; }
        .login-btn { width:100%; padding:11px; background:#e87734; color:#fff; border:none; font-size:13px; font-weight:bold; cursor:pointer; letter-spacing:0.5px; transition:background 0.1s; }
        .login-btn:hover { background:#cf6520; }
        .note { text-align:center; margin-top:16px; font-size:11px; color:#999; }
        footer { background:#444; padding:20px; text-align:center; }
        .f-logo { font-family:'Great Vibes',cursive; font-size:24px; color:#e87734; text-shadow:1px 1px 3px rgba(0,0,0,0.5); margin-bottom:8px; }
        .f-nav a { color:#bbb; font-size:12px; margin:0 5px; text-decoration:none; }
        .f-nav a:hover { color:#e87734; }
        .f-copy { font-size:11px; color:#777; margin-top:5px; }
    </style>
</head>
<body>
<header><div class="logo">Terra's Finest</div></header>
<div class="wrap">
    <div class="box">
        <div class="box-title">Terra's Finest</div>
        <div class="box-sub">Members only — please log in to continue</div>
        <div class="err" id="err">Incorrect password. Please try again.</div>
        <label>Password</label>
        <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
        <button class="login-btn" onclick="login()">LOGIN</button>
        <div class="note">This site is private. Unauthorized access is prohibited.</div>
    </div>
</div>
<footer>
    <div class="f-logo">Terra's Finest</div>
    <div class="f-nav"><a href="#">About</a> | <a href="#">Contact</a> | <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a> | <a href="#">DMCA</a></div>
    <div class="f-copy">© 1095-1097 Terra's Finest. All rights reserved.</div>
</footer>
<script>
    const PW = 'hillock7';
    function login() {
        const v = document.getElementById('pw').value;
        if (v === PW) {
            sessionStorage.setItem('tf_auth','1');
            window.location.href = 'profile.html';
        } else {
            document.getElementById('err').classList.add('show');
            document.getElementById('pw').value = '';
            document.getElementById('pw').focus();
        }
    }
</script>
</body>
</html>
